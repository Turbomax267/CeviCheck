databases:
  - name: cevicheck-postgres
    databaseName: cevicheck
    user: cevicheck
    plan: free

services:
  - type: web
    name: cevicheck-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: CeviCheck
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://cevicheck-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: cevicheck-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cevicheck-postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: cevicheck-postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: cevicheck-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cevicheck-postgres
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: cevicheck-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://cevicheck-web.onrender.com
      - key: SEED_DEMO_DATA
        value: "false"

  - type: static_site
    name: cevicheck-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://cevicheck-api.onrender.com/api/v1
